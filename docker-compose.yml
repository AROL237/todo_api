services:
  database:
    image: mysql:8.0-debian
    container_name: database
    restart: always
    env_file:
      - .env
    # environment:
    #   - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    #   - MYSQL_DATABASE=${MYSQL_DATABASE}
    #   - MYSQL_USER=${MYSQL_USER}
    #   - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - 3306:3306
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
  adminer:
    image: adminer
    restart: always
    ports:
      - 5050:8080

  frontend:
    image: todo_ui:1.0.3
    container_name: frontend

    # build:
    #   context: ./../todo_ui
    #   dockerfile: Dockerfile
    # environment:
    #   - NEXT_PUBLIC_API_BASEURL=${NEXT_PUBLIC_API_BASEURL}
    env_file:
      - ./../todo_ui/.env.production
    ports:
      - 3000:3000
    depends_on:
      - backend
  backend:
    # image: todo-backend:0.0.1 # build: parch version with a waiting script to wait for the database to be ready
    container_name: backend
    image: signing/todo_api:1.0.1
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    env_file:
      - ./.env
    # environment:
    #   - NODE_ENV=production
    #   - PORT=8000
    #   - MYSQL_USER=${MYSQL_USER}
    #   - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    #   - MYSQL_DATABASE=${MYSQL_DATABASE}
    #   - DB_HOST=${DB_HOST}
    #   - DB_PORT=3306
    #   - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    ports:
      - 8000:8000
    depends_on:
      - database
    restart: always

  nginx:
    image: nginx:stable-perl
    ports:
      - 8080:8080
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
volumes:
  db_data:
    driver: local
networks:
  default:
    driver: bridge
