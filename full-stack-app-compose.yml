
services:
  backend: 
    container_name: backend
    image: signing/todo_api:latest
    environment:
      - NODE_ENV=production
      - PORT=8000
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    ports:
        - 8000:8000
    restart: always
  frontend:
    container_name: frontend
    image: signing/todo_ui:latest
    environment:
      - NEXT_PUBLIC_API_BaseUrl=http://localhost:8000
    ports:
      - 3000:3000
    restart: always
    
